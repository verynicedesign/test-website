<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>btn-morph — Cream-Filled Variant Preview</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink:    #1B1B1B;
      --cream:  #F7F5F3;
      --lime:   #EEF4A9;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Syne', sans-serif;
      background: var(--cream);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 80px;
      padding: 80px 40px;
    }

    .preview-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    .preview-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-60, #767676);
    }

    .preview-row {
      display: flex;
      align-items: center;
      gap: 32px;
      flex-wrap: wrap;
      justify-content: center;
    }

    /* ── ORIGINAL btn-morph (for comparison) ────────── */
    .btn-morph {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 28px;
      height: 52px;
      border-radius: 100px;
      border: 0.5px solid var(--ink);
      background: transparent;
      color: var(--ink);
      font-family: 'Syne', sans-serif;
      font-size: 13.5px;
      font-weight: 600;
      letter-spacing: 0.03em;
      text-decoration: none;
      cursor: pointer;
      overflow: visible;
      transition:
        transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1),
        box-shadow 0.25s ease;
    }

    .btn-morph:hover {
      transform: rotate(-2deg) translateY(-2px);
      box-shadow: 5px 6px 0 0 var(--ink);
    }

    .btn-morph:active {
      transform: rotate(-4deg) scale(0.97);
    }

    .btn-morph:focus-visible {
      outline: 2px solid var(--lime);
      outline-offset: 3px;
    }

    /* Dots */
    .btn-dot {
      position: absolute;
      border-radius: 50%;
      background: var(--lime);
      border: 0.5px solid var(--ink);
      opacity: 0;
      pointer-events: none;
      transition:
        opacity 0.18s ease,
        transform 0.52s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .btn-dot-1 { width: 13px; height: 13px; top: 50%;    left: 0;    transform: translate(0, -50%); }
    .btn-dot-2 { width: 10px; height: 10px; top: 0;      left: 18%;  transform: translate(0, 0); }
    .btn-dot-3 { width: 14px; height: 14px; top: 0;      left: 50%;  transform: translate(-50%, 0); }
    .btn-dot-4 { width: 10px; height: 10px; top: 0;      right: 18%; transform: translate(0, 0); }
    .btn-dot-5 { width: 13px; height: 13px; top: 50%;    right: 0;   transform: translate(0, -50%); }
    .btn-dot-6 { width: 18px; height: 18px; bottom: 0;   right: 12%; transform: translate(0, 0); }
    .btn-dot-7 { width: 10px; height: 10px; bottom: 0;   left: 28%;  transform: translate(0, 0); }
    .btn-dot-8 { width: 11px; height: 11px; bottom: 0;   left: 8%;   transform: translate(0, 0); }

    .btn-morph:hover .btn-dot   { opacity: 1; }
    .btn-morph:hover .btn-dot-1 { transform: translate(-18px, -50%); }
    .btn-morph:hover .btn-dot-2 { transform: translate(-8px, -16px); }
    .btn-morph:hover .btn-dot-3 { transform: translate(-50%, -17px); }
    .btn-morph:hover .btn-dot-4 { transform: translate(8px, -14px); }
    .btn-morph:hover .btn-dot-5 { transform: translate(18px, -50%); }
    .btn-morph:hover .btn-dot-6 { transform: translate(10px, 18px); }
    .btn-morph:hover .btn-dot-7 { transform: translate(-6px, 16px); }
    .btn-morph:hover .btn-dot-8 { transform: translate(-12px, 14px); }

    .btn-morph-sm {
      height: 40px;
      padding: 0 22px;
      font-size: 12px;
    }

    /* ── CREAM-FILLED VARIANT ───────────────────────── */
    .btn-morph-filled {
      background: var(--lime);
    }

    /* ── INK-FILLED VARIANT ─────────────────────────── */
    .btn-morph-ink {
      background: var(--ink);
      border-color: var(--ink);
      color: var(--cream);
    }

    .btn-morph-ink:hover {
      box-shadow: 5px 6px 0 0 #C5CA7A;
    }

    /* ── DARK BACKGROUND SECTION ───────────────────── */
    .dark-section {
      background: var(--ink);
      border-radius: 24px;
      padding: 64px 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    .dark-section .preview-label {
      color: rgba(247, 245, 243, 0.5);
    }

    /* Cream-filled on dark */
    .dark-section .btn-morph-filled {
      background: var(--cream);
      border-color: var(--ink);
      color: var(--ink);
    }

    .dark-section .btn-morph-filled:hover {
      box-shadow: 5px 6px 0 0 #C5CA7A;
    }

    /* Original on dark (for comparison) */
    .dark-section .btn-morph:not(.btn-morph-filled) {
      border-color: var(--cream);
      color: var(--cream);
    }

    .dark-section .btn-morph:not(.btn-morph-filled):hover {
      box-shadow: 5px 6px 0 0 #494949;
    }
  </style>
</head>
<body>

  <!-- Light background -->
  <div class="preview-section">
    <span class="preview-label">Original — Light BG</span>
    <div class="preview-row">
      <a href="#" class="btn-morph" onclick="return false">
        Let's Talk
        <span class="btn-dot btn-dot-1"></span>
        <span class="btn-dot btn-dot-2"></span>
        <span class="btn-dot btn-dot-3"></span>
        <span class="btn-dot btn-dot-4"></span>
        <span class="btn-dot btn-dot-5"></span>
        <span class="btn-dot btn-dot-6"></span>
        <span class="btn-dot btn-dot-7"></span>
        <span class="btn-dot btn-dot-8"></span>
      </a>
      <a href="#" class="btn-morph btn-morph-sm" onclick="return false">
        Let's Talk
        <span class="btn-dot btn-dot-1"></span>
        <span class="btn-dot btn-dot-2"></span>
        <span class="btn-dot btn-dot-3"></span>

        <span class="btn-dot btn-dot-5"></span>
        <span class="btn-dot btn-dot-6"></span>
        <span class="btn-dot btn-dot-7"></span>
        <span class="btn-dot btn-dot-8"></span>
      </a>
    </div>
  </div>

  <div class="preview-section">
    <span class="preview-label">Ink-Filled — Light BG</span>
    <div class="preview-row">
      <a href="#" class="btn-morph btn-morph-ink" onclick="return false">

        <span class="btn-dot btn-dot-6"></span>
        <span class="btn-dot btn-dot-7"></span>
        <span class="btn-dot btn-dot-8"></span>
      </a>
      <a href="#" class="btn-morph btn-morph-ink btn-morph-sm" onclick="return false">
        Let's Talk
        <span class="btn-dot btn-dot-1"></span>
        <span class="btn-dot btn-dot-2"></span>
        <span class="btn-dot btn-dot-3"></span>
        <span class="btn-dot btn-dot-4"></span>
        <span class="btn-dot btn-dot-5"></span>
        <span class="btn-dot btn-dot-6"></span>
        <span class="btn-dot btn-dot-7"></span>
        <span class="btn-dot btn-dot-8"></span>
      </a>
    </div>
  </div>

  <!-- Dark background -->
  <div class="dark-section">
    <span class="preview-label">Original — Dark BG</span>
    <div class="preview-row">
      <a href="#" class="btn-morph" onclick="return false">
        Let's Talk
        <span class="btn-dot btn-dot-1"></span>
        <span class="btn-dot btn-dot-2"></span>
        <span class="btn-dot btn-dot-3"></span>
        <span class="btn-dot btn-dot-4"></span>
        <span class="btn-dot btn-dot-5"></span>
        <span class="btn-dot btn-dot-6"></span>
        <span class="btn-dot btn-dot-7"></span>
        <span class="btn-dot btn-dot-8"></span>
      </a>
      <a href="#" class="btn-morph btn-morph-sm" onclick="return false">
        Let's Talk
        <span class="btn-dot btn-dot-1"></span>
        <span class="btn-dot btn-dot-2"></span>
        <span class="btn-dot btn-dot-3"></span>
        <span class="btn-dot btn-dot-4"></span>
        <span class="btn-dot btn-dot-5"></span>
        <span class="btn-dot btn-dot-6"></span>
        <span class="btn-dot btn-dot-7"></span>
        <span class="btn-dot btn-dot-8"></span>
      </a>
    </div>

    <span class="preview-label" style="margin-top: 32px;">Cream-Filled — Dark BG</span>
    <div class="preview-row">
      <a href="#" class="btn-morph btn-morph-filled" onclick="return false">
        Let's Talk
        <span class="btn-dot btn-dot-1"></span>
        <span class="btn-dot btn-dot-2"></span>
        <span class="btn-dot btn-dot-3"></span>
        <span class="btn-dot btn-dot-4"></span>

        <span class="btn-dot btn-dot-6"></span>
        <span class="btn-dot btn-dot-7"></span>

      </a>
      <a href="#" class="btn-morph btn-morph-filled btn-morph-sm" onclick="return false">
        Let's Talk

  </div>

</body>
</html>
